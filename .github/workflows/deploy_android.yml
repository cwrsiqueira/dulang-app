# Antes de cada push que dispara este workflow: incrementar `version` no pubspec.yaml
# (modelo acordado: 1.0.N+N → 1.0.(N+1)+(N+1)). Ver docs/ai-context/engineering-rules.md
name: Deploy Android to Internal Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Alinhar ao ambiente de desenvolvimento (evita pin de intl/google_fonts/local_auth divergente).
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Create environment.json
        run: |
          mkdir -p assets/environment_values
          echo "${{ secrets.ENVIRONMENT_JSON }}" | base64 --decode > assets/environment_values/environment.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/symbols --dart-define=YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}

      - name: Upload to Play Store Internal Test
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: com.mycompany.dulang
          releaseFiles: build/app/outputs/bundle/release/*.aab
          tracks: internal
          status: completed
          # Play exige quando o app não pode ir direto à revisão; envio manual pela Console depois.
          changesNotSentForReview: true

# Antes de cada dispatch: incrementar `version` no pubspec.yaml
# (modelo acordado: 1.0.N+N → 1.0.(N+1)+(N+1)). Ver docs/ai-context/engineering-rules.md
name: Deploy iOS to TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Create environment.json
        run: |
          mkdir -p assets/environment_values
          echo "${{ secrets.ENVIRONMENT_JSON }}" | base64 --decode > assets/environment_values/environment.json

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Install Apple certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dist_cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PP_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/dulang_appstore.mobileprovision
          echo "$PP_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/embedded.plist"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/embedded.plist")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"

      - name: Patch ExportOptions team ID
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/TEAM_ID_PLACEHOLDER/$TEAM_ID/" ios/ExportOptions.plist

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --dart-define=YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }} \
            --dart-define=REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }} \
            --export-options-plist=ios/ExportOptions.plist

      # altool (Xcode 16) costuma falhar com JWT -26000 para chaves API *individuais*; a Apple
      # recomenda fluxos via App Store Connect API. fastlane pilot usa Spaceship e aceita a mesma .p8.
      - name: Install fastlane
        run: sudo gem install fastlane -N

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          if [ ! -d build/ios/ipa ]; then
            echo "::error::Pasta build/ios/ipa inexistente. Confira o log do passo 'Build IPA'."
            ls -la build/ios 2>/dev/null || ls -la build 2>/dev/null || true
            exit 1
          fi
          IPA_PATH=$(find build/ios/ipa -maxdepth 1 -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -z "${IPA_PATH:-}" ] || [ ! -f "$IPA_PATH" ]; then
            echo "::error::Nenhum arquivo .ipa em build/ios/ipa."
            ls -la build/ios/ipa
            exit 1
          fi
          P8_PATH="$RUNNER_TEMP/AuthKey_${API_KEY_ID}.p8"
          printf '%s\n' "$API_KEY_CONTENT" | tr -d '\r' > "$P8_PATH"
          chmod 600 "$P8_PATH"
          API_JSON="$RUNNER_TEMP/asc_api_key.json"
          jq -n --arg kid "$API_KEY_ID" --arg iss "$API_ISSUER_ID" --rawfile key "$P8_PATH" \
            '{key_id: $kid, issuer_id: $iss, key: $key, in_house: false}' > "$API_JSON"
          echo "Uploading via fastlane pilot: $IPA_PATH"
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "$API_JSON" \
            --skip_waiting_for_build_processing true

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
